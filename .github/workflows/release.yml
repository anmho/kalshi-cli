name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm"
        required: false
        default: "false"
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check and build
        run: bun run check && bun run build

      - name: Verify Tag Matches package.json
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "Tag/package mismatch: tag=$tag_version package=$pkg_version"
            exit 1
          fi
          echo "Tag matches package version: $pkg_version"

      - name: Pack npm artifact
        run: npm pack --pack-destination .

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tgz

      - name: Publish package
        if: ${{ github.event_name == 'push' || github.event.inputs.publish == 'true' }}
        run: npm publish --cache /tmp/npm-cache
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
